name: Keep Database Warm

on:
  schedule:
    # Runs every 6 hours to keep MongoDB Atlas from sleeping
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Site to Keep MongoDB Atlas Active
        run: |
          URL="https://ghrceprojects.netlify.app"
          echo "Pinging $URL to keep MongoDB Atlas active..."
          curl --retry 3 --retry-delay 5 -f -L "$URL/api/batches" \
            && echo "✅ Ping successful via /api/batches" \
            || (curl --retry 3 --retry-delay 5 -f -L "$URL" \
              && echo "✅ Ping successful via root URL" \
              || echo "⚠️ Ping failed but not blocking CI")
