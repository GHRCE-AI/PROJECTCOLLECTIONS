name: Keep Database Warm

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Site to Keep Database Warm
        run: |
          URL="${{ secrets.DEPLOYED_URL }}"
          if [ -z "$URL" ]; then
            echo "⚠️ DEPLOYED_URL secret is not set. Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          echo "Pinging $URL to keep MongoDB Atlas active..."
          curl -f -L "$URL/api/batches" || curl -f -L "$URL"
